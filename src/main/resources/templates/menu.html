<!DOCTYPE html>
<html lang="en" xmlns:th = "http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8" />
    <title>Spa Menu</title>
    <link href="/styles.css" th:href="@{/styles.css}" rel="stylesheet" />
</head>
<body>
<h1>My Super Fancy Spa</h1>
<div id = "clientProfile">
    <h2>My Profile</h2>
    <p th:text="${name}"></p>
    <p th:text="${skintype}"></p>
    <p th:text="${manipedi}"></p>

</div>
<div id = "servicesMenu">
    <table>
        <th:block th:each="facials : ${appropriateFacials}">
            <tr>
                <td th:text="${facials}"></td>
            </tr>
        </th:block>

    </table>
    <div>
        <th:block th:if="${manipedi.equals('manicure')}">
            <h3>Manicure</h3>
            <p th:replace="fragments :: manicureDescription"></p>
        </th:block>
        <th:block th:unless="${manipedi.equals('manicure')}">
            <h3>Pedicure</h3>
            <p th:replace="fragments :: pedicureDescription"></p>
        </th:block>
        <th:block th:if="${manipedi.equals('both')}">
            <h3>Manicure & Pedicure</h3>
            <p th:replace="fragments :: manicureDescription"></p>
            <p th:replace="fragments :: pedicureDescription"></p>
        </th:block>
    </div>
</div>
<footer>
    <div class="square red"></div>
    <div class="square pink"></div>
    <div class="square blue"></div>
    <div class="square green"></div>
</footer>
</body>
</html>
